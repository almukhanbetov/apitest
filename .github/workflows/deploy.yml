name: deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: |
          go mod tidy
          go build -o apitest
      - name: upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 188.244.115.135
          username: almuko
          port: 22122
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "apitest"
          target: "/root/almuko/apitest"

      - name: restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 188.244.115.135
          username: almuko
          port: 22122
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            pkill apitest || true
            cd /root/almuko/apitest
            nohup ./apitest > log.txt 2>&1 &